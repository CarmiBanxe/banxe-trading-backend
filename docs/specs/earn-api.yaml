openapi: 3.0.3
info:
  title: BANXE Earn — BaaS read-only rate comparison (T7.5)
  version: 0.1.0
  description: >
    BaaS / TaaS Tier-2 Earn ANALYTICS surface. Read-only, advisory-only.

    GET /v1/earn/rates returns a current-yield comparison ("rate cards") across a
    basket of assets. Yields are ADVISORY estimates / simulations, NOT a promise
    of return, NOT investment advice and NOT execution. There is NO stake /
    unstake and NO order placement here (self-custodial). Per MiCA / MiFID II,
    analytics and execution are kept separate.

    SANDBOX this sprint: rates are deterministic mock data, flagged
    `source: "sandbox-mock"`. No real StakeKit / Aave integration, no keys, no
    network. Real earn execution and live rate feeds are a future Phase 2+ under
    a separate ADR + legal review.

    All monetary / metric fields are decimal strings (I-01). The internal path is
    GET /api/v1/earn/rates; Kong gateway, partner keys, billing and rate limits
    are out of scope.
paths:
  /v1/earn/rates:
    get:
      operationId: getEarnRates
      summary: Current-yield comparison (advisory analytics, read-only)
      description: >
        Read-only advisory comparison of mock yields across assets. NO stake /
        unstake, NO execution (self-custodial).
      parameters:
        - in: query
          name: assets
          required: false
          style: form
          explode: true
          schema:
            type: array
            items: { type: string }
          description: assets to compare; omitted → default basket
      responses:
        "200":
          description: Yield comparison (sandbox-mock)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EarnRatesResponse" }
              example:
                rates:
                  - asset: "USDC"
                    protocol: "mock-lending"
                    apyPct: "5.0000"
                    lockupDays: 0
                    variableRate: true
                    riskBand: "low"
                    source: "sandbox-mock"
                  - asset: "ETH"
                    protocol: "mock-liquid-staking"
                    apyPct: "4.2000"
                    lockupDays: 0
                    variableRate: true
                    riskBand: "medium"
                    source: "sandbox-mock"
                source: "sandbox-mock"
                asOf: "2026-06-14T00:00:00+00:00"
                disclaimer: "Advisory analytics only — sandbox mock yields ..."
  /v1/earn/statement:
    get:
      operationId: getEarnStatement
      summary: Earn advisory read-only statement/summary (composed, read-only)
      description: >
        Read-only advisory per-asset earn statement composing mock rates, fee/product
        detail, and advisory lifecycle status. NO stake/unstake, NO live balances,
        positions, execution, or payments (self-custodial, sandbox-mock).
      parameters:
        - in: query
          name: assets
          required: false
          style: form
          explode: true
          schema:
            type: array
            items: { type: string }
          description: assets to summarise; omitted -> default basket
      responses:
        "200":
          description: Advisory earn statements (sandbox-mock)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EarnStatementResponse" }
  /v1/earn/taxonomy:
    get:
      operationId: getEarnTaxonomy
      summary: Earn taxonomy reference (risk bands / statuses / lock-up tenors, read-only)
      description: >
        Read-only descriptive reference over the earn controlled vocabularies (RiskBand,
        EarnAdvisoryStatus) plus config-as-data lock-up tenor buckets. Descriptor view only; NO
        APY/yield re-derivation, NO balances, fees, execution, or live-pipeline transaction states.
      responses:
        "200":
          description: Earn taxonomy reference (sandbox-mock)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EarnTaxonomy" }
components:
  schemas:
    RateCard:
      type: object
      required: [asset, protocol, apyPct, lockupDays, variableRate, riskBand, source]
      additionalProperties: false
      properties:
        asset: { type: string }
        protocol: { type: string }
        apyPct: { type: string, description: "annual percentage yield (decimal, I-01)" }
        lockupDays: { type: integer }
        variableRate: { type: boolean }
        riskBand:
          type: string
          enum: [low, medium, high]
          description: "qualitative risk band (advisory)"
        source:
          type: string
          enum: [sandbox-mock]
    EarnRatesResponse:
      type: object
      required: [rates, source, asOf, disclaimer]
      additionalProperties: false
      properties:
        rates:
          type: array
          items: { $ref: "#/components/schemas/RateCard" }
        source:
          type: string
          enum: [sandbox-mock]
        asOf: { type: string, description: "ISO-8601 timestamp" }
        disclaimer: { type: string, description: "MiCA/MiFID advisory disclosure" }
    EarnStatement:
      type: object
      required: [asset, protocol, currentYieldPct, lockupDays, variableRate, riskBand, feeSummary, advisoryStatus, source]
      additionalProperties: false
      properties:
        asset: { type: string }
        protocol: { type: string }
        currentYieldPct: { type: string, description: "current advisory yield (decimal, I-01)" }
        lockupDays: { type: integer }
        variableRate: { type: boolean }
        riskBand: { type: string, enum: [low, medium, high] }
        feeSummary: { type: string, description: "advisory fee/product detail (from EarnMetrics.riskSummary)" }
        advisoryStatus:
          type: string
          nullable: true
          enum: [CREATED, INVESTING, DEPOSITING, WITHDRAWING, NORMAL, CLOSED, FAILED, NONE, PROCESSING, COMPLETED, ERROR]
          description: "advisory earn lifecycle (EarnAdvisoryStatus); null if not determinable"
        source: { type: string, enum: [sandbox-mock] }
    EarnStatementResponse:
      type: object
      required: [statements, source, asOf, disclaimer]
      additionalProperties: false
      properties:
        statements:
          type: array
          items: { $ref: "#/components/schemas/EarnStatement" }
        source: { type: string, enum: [sandbox-mock] }
        asOf: { type: string, description: "ISO-8601 timestamp" }
        disclaimer: { type: string }

    RiskBandDescriptor:
      type: object
      required: [code, label, ordering, note]
      additionalProperties: false
      properties:
        code: { type: string, enum: [low, medium, high] }
        label: { type: string }
        ordering: { type: integer, description: "relative ordering (meta, not a money value)" }
        note: { type: string }
    AdvisoryStatusDescriptor:
      type: object
      required: [code, label, phase]
      additionalProperties: false
      properties:
        code: { type: string }
        label: { type: string }
        phase: { type: string, enum: [active, terminal, inactive, error] }
    LockupTenorDescriptor:
      type: object
      required: [code, label, minDays, maxDays]
      additionalProperties: false
      properties:
        code: { type: string }
        label: { type: string }
        minDays: { type: integer, description: "lower day bound (meta config, not an amount)" }
        maxDays: { type: integer, nullable: true }
    EarnTaxonomy:
      type: object
      required: [riskBands, advisoryStatuses, lockupTenors, source]
      additionalProperties: false
      properties:
        riskBands: { type: array, items: { $ref: "#/components/schemas/RiskBandDescriptor" } }
        advisoryStatuses: { type: array, items: { $ref: "#/components/schemas/AdvisoryStatusDescriptor" } }
        lockupTenors: { type: array, items: { $ref: "#/components/schemas/LockupTenorDescriptor" } }
        source: { type: string, enum: [sandbox-mock] }
