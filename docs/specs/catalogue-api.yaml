openapi: 3.0.3
info:
  title: BANXE advisory catalogue meta (M1.14)
  version: "1.0"
  description: >
    Public read-only catalogue meta surface (sandbox-mock). Reports derived integer counts of the
    advisory catalogues (symbols, instruments, markets, assets) and the package version. Derived
    from existing list functions; no second registry/counter/version source. NO balances, fees,
    execution, payments, or infra/secret/ops metrics. Internal observability (/internal/*) is NOT
    part of this surface and stays infra-fenced.
paths:
  /v1/catalogue/meta:
    get:
      operationId: getCatalogueMeta
      summary: Catalogue meta (derived counts + version, read-only)
      responses:
        "200":
          description: Catalogue meta summary (sandbox-mock)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogueMeta" }
  /v1/catalogue/breakdown:
    get:
      operationId: getCatalogueBreakdown
      summary: Catalogue breakdown (per-asset-class counts, read-only)
      description: >
        Read-only per-asset_class breakdown (crypto / stablecoin / fiat) derived from the asset
        catalogue. Integer meta counts only; NO balances, APY/rates, fees, execution, or payments.
        Does not modify the flat /v1/catalogue/meta surface.
      responses:
        "200":
          description: Catalogue breakdown (sandbox-mock)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogueBreakdown" }
  /v1/catalogue/instruments-breakdown:
    get:
      operationId: getInstrumentsBreakdown
      summary: Instruments breakdown (by fee-schedule / tick-size, read-only)
      description: >
        Read-only instrument counts grouped by fee_schedule_ref and tick_size, derived from the
        instrument catalogue. Integer meta counts only; NO balances, APY/rates, fees, execution,
        or payments. fee_schedule_ref is treated as an opaque string label (no fee computation).
      responses:
        "200":
          description: Instruments breakdown (sandbox-mock)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstrumentsBreakdown" }
  /v1/catalogue/symbols-breakdown:
    get:
      operationId: getSymbolsBreakdown
      summary: Symbols breakdown (by status / precision, read-only)
      description: >
        Read-only symbol counts grouped by status, price_precision and qty_precision, derived from
        the symbol universe. Integer meta counts only; NO balances, APY/rates, fees, execution, or
        payments. base/quote breakdown is owned by the markets breakdown, not duplicated here.
      responses:
        "200":
          description: Symbols breakdown (sandbox-mock)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SymbolsBreakdown" }
  /v1/catalogue/accounts-breakdown:
    get:
      operationId: getAccountsBreakdown
      summary: Accounts breakdown (by type / ledger-nature / status, read-only)
      description: >
        Read-only advisory account counts grouped by account_type, ledger_nature and account_status,
        derived from the advisory account-metadata accessor. Integer meta counts only; NO balances,
        postings, amounts, ledger ops, APY, fees, or payments. Midaz LedgerPort is not called.
      responses:
        "200":
          description: Accounts breakdown (sandbox-mock)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountsBreakdown" }
  /v1/catalogue/network-breakdown:
    get:
      operationId: getNetworkBreakdown
      summary: Network breakdown (per-network asset counts, flatten, read-only)
      description: >
        Read-only per-blockchain-network asset counts, derived by flattening each asset's networks
        list. Flatten semantics: an asset on N networks contributes to N buckets; an asset with an
        empty networks list contributes to none, so total_memberships (sum of by_network counts)
        need NOT equal total_assets. Integer meta counts only; NO balances, postings, APY, fees,
        or payments.
      responses:
        "200":
          description: Network breakdown (sandbox-mock)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NetworkBreakdown" }
  /v1/catalogue/capability-breakdown:
    get:
      operationId: getCapabilityBreakdown
      summary: Capability breakdown (per-capability account counts, flatten, read-only)
      description: >
        Read-only per-capability account counts, derived by flattening each advisory account's
        capabilities list. Flatten semantics: an account with N capabilities contributes to N
        buckets; an account with an empty capabilities list contributes to none, so
        total_memberships (sum of by_capability counts) need NOT equal total_accounts. Integer meta
        counts only; NO balances, postings, amounts, APY, fees, or payments.
      responses:
        "200":
          description: Capability breakdown (sandbox-mock)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CapabilityBreakdown" }
  /v1/catalogue/supported-asset-breakdown:
    get:
      operationId: getSupportedAssetBreakdown
      summary: Supported-asset breakdown (per-asset account counts, flatten, read-only)
      description: >
        Read-only per-supported-asset account counts, derived by flattening each advisory account's
        supported_assets list. Accounts-per-asset (account-domain), NOT a second asset catalogue.
        Flatten semantics: an account with N supported assets contributes to N buckets; an account
        with an empty list contributes to none, so total_memberships (sum of by_supported_asset
        counts) need NOT equal total_accounts. Integer meta counts only; supported_assets is a
        support label, NOT a held amount; NO balances, postings, APY, fees, or payments.
      responses:
        "200":
          description: Supported-asset breakdown (sandbox-mock)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupportedAssetBreakdown" }
  /v1/catalogue/advisory-surface:
    get:
      operationId: getAdvisorySurface
      summary: Advisory-surface manifest (static config-as-data inventory, read-only)
      description: >
        Read-only inventory of the advisory read-only endpoint families published by the migration
        lane, with per-family endpoint counts and the reused package version. Config-as-data ONLY
        (a curated list, NOT a programmatic route scan); by construction it excludes infra
        (/internal/*, /healthz) and live/regulated/sandbox surfaces (orders, execution, fees, quant,
        market_making, marketplace, sandbox, baas). Integer meta counts only; NO balances, postings,
        APY, fees, uptime, latency, or any infra/ops metric.
      responses:
        "200":
          description: Advisory-surface manifest (sandbox-mock)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdvisorySurfaceManifest" }
components:
  schemas:
    CatalogueMeta:
      type: object
      required: [symbolsCount, instrumentsCount, marketsCount, assetsCount, version, source]
      additionalProperties: false
      properties:
        symbolsCount: { type: integer, description: "count of advisory symbols (meta, not a money value)" }
        instrumentsCount: { type: integer }
        marketsCount: { type: integer }
        assetsCount: { type: integer }
        version: { type: string, description: "package __version__ (single version source)" }
        source: { type: string, enum: [sandbox-mock] }

    AssetClassCount:
      type: object
      required: [assetClass, count]
      additionalProperties: false
      properties:
        assetClass:
          type: string
          description: >
            asset class label; canonical values are crypto / stablecoin / fiat, but the breakdown
            returns any class present in the catalogue (non-exhaustive, matches runtime).
        count: { type: integer, description: "asset count in this class (meta, not a money value)" }
    CatalogueBreakdown:
      type: object
      required: [breakdown, total, source]
      additionalProperties: false
      properties:
        breakdown: { type: array, items: { $ref: "#/components/schemas/AssetClassCount" } }
        total: { type: integer }
        source: { type: string, enum: [sandbox-mock] }

    InstrumentDimensionCount:
      type: object
      required: [key, count]
      additionalProperties: false
      properties:
        key:
          type: string
          description: >
            categorical instrument-dimension value; e.g. a fee_schedule_ref like "spot-default" or a
            tick_size like "0.01" — non-exhaustive, matches runtime (grows with the catalogue).
        count: { type: integer, description: "instrument count for this key (meta, not a money value)" }
    InstrumentsBreakdown:
      type: object
      required: [byFeeSchedule, byTickSize, total, source]
      additionalProperties: false
      properties:
        byFeeSchedule: { type: array, items: { $ref: "#/components/schemas/InstrumentDimensionCount" } }
        byTickSize: { type: array, items: { $ref: "#/components/schemas/InstrumentDimensionCount" } }
        total: { type: integer, description: "number of instruments" }
        source: { type: string, enum: [sandbox-mock] }

    SymbolDimensionCount:
      type: object
      required: [key, count]
      additionalProperties: false
      properties:
        key:
          type: string
          description: >
            categorical symbol-dimension value; e.g. a status like "trading" or a stringified
            precision like "2" / "4" — non-exhaustive, matches runtime (grows with the universe).
        count: { type: integer, description: "symbol count for this key (meta, not a money value)" }
    SymbolsBreakdown:
      type: object
      required: [byStatus, byPricePrecision, byQtyPrecision, total, source]
      additionalProperties: false
      properties:
        byStatus: { type: array, items: { $ref: "#/components/schemas/SymbolDimensionCount" } }
        byPricePrecision: { type: array, items: { $ref: "#/components/schemas/SymbolDimensionCount" } }
        byQtyPrecision: { type: array, items: { $ref: "#/components/schemas/SymbolDimensionCount" } }
        total: { type: integer, description: "number of symbols" }
        source: { type: string, enum: [sandbox-mock] }

    AccountDimensionCount:
      type: object
      required: [key, count]
      additionalProperties: false
      properties:
        key:
          type: string
          description: >
            categorical account-dimension value; e.g. account_type INTERNAL/EXTERNAL/SYSTEM,
            ledger_nature ACTIVE/PASSIVE, account_status ACTIVE — non-exhaustive, matches runtime.
        count: { type: integer, description: "account count for this key (meta, not a money value)" }
    AccountsBreakdown:
      type: object
      required: [byAccountType, byLedgerNature, byAccountStatus, total, source]
      additionalProperties: false
      properties:
        byAccountType: { type: array, items: { $ref: "#/components/schemas/AccountDimensionCount" } }
        byLedgerNature: { type: array, items: { $ref: "#/components/schemas/AccountDimensionCount" } }
        byAccountStatus: { type: array, items: { $ref: "#/components/schemas/AccountDimensionCount" } }
        total: { type: integer, description: "number of advisory accounts" }
        source: { type: string, enum: [sandbox-mock] }

    NetworkCount:
      type: object
      required: [network, count]
      additionalProperties: false
      properties:
        network:
          type: string
          description: >
            blockchain network label; canonical examples bitcoin / ethereum, but any catalogued
            network may appear — non-exhaustive, matches runtime (grows with the catalogue).
        count: { type: integer, description: "asset count on this network (meta, not a money value)" }
    NetworkBreakdown:
      type: object
      required: [byNetwork, totalAssets, totalMemberships, source]
      additionalProperties: false
      properties:
        byNetwork: { type: array, items: { $ref: "#/components/schemas/NetworkCount" } }
        totalAssets: { type: integer, description: "catalogue size (denominator; not sum of counts)" }
        totalMemberships:
          type: integer
          description: >
            sum of by_network counts (network memberships); need NOT equal totalAssets because
            multi-network assets count once per network and empty-networks assets count in none.
        source: { type: string, enum: [sandbox-mock] }

    CapabilityCount:
      type: object
      required: [capability, count]
      additionalProperties: false
      properties:
        capability:
          type: string
          description: >
            advisory account capability label; canonical examples fiat / crypto / self_custodial /
            internal, but any catalogued capability may appear — non-exhaustive, matches runtime.
        count: { type: integer, description: "account count for this capability (meta, not a money value)" }
    CapabilityBreakdown:
      type: object
      required: [byCapability, totalAccounts, totalMemberships, source]
      additionalProperties: false
      properties:
        byCapability: { type: array, items: { $ref: "#/components/schemas/CapabilityCount" } }
        totalAccounts: { type: integer, description: "account count (denominator; not sum of counts)" }
        totalMemberships:
          type: integer
          description: >
            sum of by_capability counts (capability memberships); need NOT equal totalAccounts because
            multi-capability accounts count once per capability and empty-capability accounts count in none.
        source: { type: string, enum: [sandbox-mock] }

    SupportedAssetCount:
      type: object
      required: [asset, count]
      additionalProperties: false
      properties:
        asset:
          type: string
          description: >
            supported asset symbol; canonical examples EUR / BTC, but any catalogued asset may
            appear -- non-exhaustive, matches runtime (a support label, not a held amount).
        count: { type: integer, description: "account count supporting this asset (meta, not a money value)" }
    SupportedAssetBreakdown:
      type: object
      required: [bySupportedAsset, totalAccounts, totalMemberships, source]
      additionalProperties: false
      properties:
        bySupportedAsset: { type: array, items: { $ref: "#/components/schemas/SupportedAssetCount" } }
        totalAccounts: { type: integer, description: "account count (denominator; not sum of counts)" }
        totalMemberships:
          type: integer
          description: >
            sum of by_supported_asset counts (account-asset support memberships); need NOT equal
            totalAccounts because multi-asset accounts count once per asset and empty accounts count in none.
        source: { type: string, enum: [sandbox-mock] }

    AdvisorySurfaceFamily:
      type: object
      required: [family, endpointCount]
      additionalProperties: false
      properties:
        family:
          type: string
          description: >
            advisory surface family label; canonical examples earn / catalogue, but any advisory
            family may appear -- non-exhaustive, grows as advisory families are added (no hard enum).
        endpointCount: { type: integer, description: "read-only advisory endpoints in this family (meta)" }
    AdvisorySurfaceManifest:
      type: object
      required: [families, totalFamilies, totalEndpoints, version, source]
      additionalProperties: false
      properties:
        families: { type: array, items: { $ref: "#/components/schemas/AdvisorySurfaceFamily" } }
        totalFamilies: { type: integer }
        totalEndpoints: { type: integer, description: "sum of per-family endpoint counts (meta)" }
        version: { type: string, description: "reused package __version__ (not a second version source)" }
        source: { type: string, enum: [sandbox-mock] }
