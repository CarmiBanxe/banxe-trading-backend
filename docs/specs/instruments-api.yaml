openapi: 3.0.3
info:
  title: BANXE advisory instruments catalogue (M1.10)
  version: "1.0"
  description: >
    Read-only advisory instrument catalogue (sandbox-mock, config-as-data). Lists per-symbol
    trading parameters (tick size, min/max order quantity, fee-schedule reference). NO orders,
    execution, balances, positions, payments, or fee computation. Fee math is owned by the fee
    engine (/v1/fees/preview); only a fee_schedule_ref string is surfaced.
paths:
  /v1/instruments:
    get:
      operationId: listInstruments
      summary: Advisory instruments list (descriptive trading parameters, read-only)
      description: Deterministic list of configured instruments (advisory, sandbox-mock).
      responses:
        "200":
          description: Advisory instrument list (sandbox-mock)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InstrumentInfo" }
  /v1/instruments/{symbol}/assets:
    get:
      operationId: getInstrumentAssets
      summary: Instrument <-> asset cross-reference (composition view, read-only)
      description: >
        Read-only composition of a symbol's instrument parameters with the descriptive metadata
        of its base/quote assets. NO balances, fees, execution, payments, or wallet ops.
      parameters:
        - in: path
          name: symbol
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Instrument-asset cross-reference (sandbox-mock)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstrumentAssetXref" }
        "404":
          description: Unknown instrument (fail-closed)
  /v1/markets:
    get:
      operationId: listMarkets
      summary: Markets advisory bundle (instrument <-> asset cross-reference list, read-only)
      description: >
        Read-only list of instrument<->asset cross-references, one per configured instrument
        (instrument params + base/quote asset metadata). NO balances, fees, execution, payments,
        or wallet ops. Reuses the InstrumentAssetXref entry; no new DTO/catalogue.
      responses:
        "200":
          description: Markets bundle (sandbox-mock)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InstrumentAssetXref" }
components:
  schemas:
    InstrumentInfo:
      type: object
      required: [symbol, tickSize, minQty, maxQty, feeScheduleRef]
      additionalProperties: false
      properties:
        symbol: { type: string }
        tickSize: { type: string, description: "price granularity (decimal, I-01; trading param, not a balance)" }
        minQty: { type: string, description: "min order quantity (decimal, I-01)" }
        maxQty: { type: string, description: "max order quantity (decimal, I-01)" }
        feeScheduleRef: { type: string, description: "fee-schedule reference (no fee computation here)" }

    CryptoAssetMetadata:
      type: object
      required: [asset, name, assetClass, networks, displayDecimals, source]
      additionalProperties: false
      properties:
        asset: { type: string }
        name: { type: string }
        assetClass: { type: string, enum: [crypto, stablecoin, fiat] }
        networks: { type: array, items: { type: string } }
        displayDecimals: { type: integer, description: "display precision (not a money value)" }
        source: { type: string, enum: [sandbox-mock] }
    InstrumentAssetXref:
      type: object
      required: [symbol, instrument, baseAsset, quoteAsset]
      additionalProperties: false
      properties:
        symbol: { type: string }
        instrument: { $ref: "#/components/schemas/InstrumentInfo" }
        baseAsset: { $ref: "#/components/schemas/CryptoAssetMetadata" }
        quoteAsset: { $ref: "#/components/schemas/CryptoAssetMetadata" }
