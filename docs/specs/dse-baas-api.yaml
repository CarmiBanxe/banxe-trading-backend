openapi: 3.0.3
info:
  title: BANXE DSE — BaaS Decision Support API (T7.1)
  version: 0.1.0
  description: >
    BaaS / TaaS Tier-2 advisory endpoint. POST /v1/dss/recommend returns ranked,
    explainable recommendations with utility scores, Kelly / Half-Kelly sizing,
    and (mock) sentiment + stress overlays.

    ADVISORY-ONLY (ADR-084): NO auto-execution, NO order signing, NO casino /
    gamification. Self-custodial — the backend never holds keys. The terminal
    consumes the same engine via the internal POST /api/v1/dss/recommend.

    Each recommendation also carries Risk & Earn advisory metrics (T7.3):
    `riskMetrics` (Greeks, parametric VaR99, drawdown, unrealized PnL, liquidity)
    and, for earn actions, `earnMetrics` (yield, protocol, chain, lockup, variable
    flag, risk summary). These are ESTIMATES / simulations for partner UX (e.g. a
    "risk card" or "yield comparison") — NOT a promise of return and NOT execution.
    No new Risk/Earn execution endpoints are added; this stays inside the advisory
    DSE endpoint. Per MiCA / MiFID II: advisory vs execution are kept separate.

    All monetary / metric fields are decimal strings (I-01). External providers
    (sentiment / stress / quotes / risk / earn) are mock/fixture + env-gated this
    sprint. Kong gateway, partner API keys, billing and rate limits are out of scope.

    SANDBOX-ONLY (T8.1): the external facade POST /v1/dss/recommend is a thin,
    advisory-only, MOCK-ONLY proxy over the internal DSE engine. It is served ONLY
    when BANXE_DSE_BAAS_SANDBOX_ENABLED is true (sandbox/dev deployments); the
    production default is OFF and every request then returns 503 "sandbox
    disabled". There is NO SLA, NO billing, NO partner tiering and NO rate limits
    (future ODR). Read-only and side-effect-free: it ranks and explains, it does
    NOT execute. No partner API keys are required in sandbox.
paths:
  /v1/dss/recommend:
    post:
      operationId: recommend
      summary: Ranked explainable recommendations (advisory-only, SANDBOX-ONLY)
      description: >
        SANDBOX-ONLY advisory facade — gated by BANXE_DSE_BAAS_SANDBOX_ENABLED.
        WARNING: advisory decision-support only; it performs NO execution, signing,
        staking or wallet action and carries NO SLA/billing. Mock data only.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecommendRequest" }
      responses:
        "200":
          description: Ranked recommendations (advisory, sandbox-mock)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecommendResponse" }
        "422":
          description: Validation error
        "503":
          description: DSE BaaS sandbox is disabled (BANXE_DSE_BAAS_SANDBOX_ENABLED off)
components:
  schemas:
    Position:
      type: object
      required: [asset, sizeUsd, side]
      additionalProperties: false
      properties:
        asset: { type: string }
        sizeUsd: { type: string, description: "position size in USD (decimal)" }
        side: { type: string, enum: [long, short, spot] }
    RecommendRequest:
      type: object
      required: [asset, portfolioValueUsd]
      additionalProperties: false
      properties:
        asset: { type: string, example: "BTCUSDT" }
        portfolioValueUsd: { type: string, description: "decimal (I-01)" }
        currentPositions:
          type: array
          items: { $ref: "#/components/schemas/Position" }
        riskProfile:
          { $ref: "./dse-utility-api.yaml#/components/schemas/RiskProfile" }
        customWeights:
          { $ref: "./dse-utility-api.yaml#/components/schemas/UtilityWeights" }
        includeStressTests: { type: boolean, default: true }
        includeSentiment: { type: boolean, default: true }
    Recommendation:
      type: object
      required:
        [
          rank,
          action,
          utilityScore,
          expectedReturnPct,
          volatilityPct,
          var99Pct,
          maxDrawdownPct,
          liquidityScore,
          kellySizePct,
          halfKellySizePct,
          riskMetrics,
          reasons,
        ]
      additionalProperties: false
      properties:
        rank: { type: integer }
        action: { $ref: "./dse-utility-api.yaml#/components/schemas/Action" }
        utilityScore: { type: string, description: "U_a (decimal)" }
        expectedReturnPct: { type: string }
        volatilityPct: { type: string }
        var99Pct: { type: string }
        maxDrawdownPct: { type: string }
        liquidityScore: { type: string }
        kellySizePct: { type: string, description: "Kelly f* as % (decimal)" }
        halfKellySizePct:
          { type: string, description: "Half-Kelly default sizing (decimal)" }
        riskMetrics:
          { $ref: "./dse-utility-api.yaml#/components/schemas/RiskMetrics" }
        earnMetrics:
          {
            $ref: "./dse-utility-api.yaml#/components/schemas/EarnMetrics",
            nullable: true,
          }
        sentiment:
          {
            $ref: "./dse-utility-api.yaml#/components/schemas/SentimentScore",
            nullable: true,
          }
        stressTests:
          {
            $ref: "./dse-utility-api.yaml#/components/schemas/StressTests",
            nullable: true,
          }
        reasons: { type: string, description: "short explainable rationale" }
        riskNotes:
          {
            type: array,
            items: { type: string },
            nullable: true,
            description: "T7.6 additive: Greeks-derived advisory notes (sandbox-mock); explanation-only",
          }
        alternatives:
          {
            type: array,
            items: { $ref: "#/components/schemas/EarnAlternative" },
            nullable: true,
            description: "T7.6 additive: informational sandbox earn alternatives; NOT execution",
          }
        utilityBreakdown:
          {
            type: array,
            items: { $ref: "#/components/schemas/UtilityComponent" },
            nullable: true,
            description: "T7.7 additive: signed decomposition of utilityScore (sums to it); explainability-only, ranking unchanged",
          }
        topDriver:
          {
            type: string,
            nullable: true,
            description: "T7.7 additive: factor with the largest |contribution|",
          }
    UtilityComponent:
      type: object
      required: [factor, value, weight, contribution, direction]
      additionalProperties: false
      properties:
        factor:
          type: string
          enum: [expectedReturn, volatility, var99, drawdown, liquidity]
        value: { type: string, description: "metric value fed into utility (decimal, I-01)" }
        weight: { type: string, description: "resolved profile weight (decimal, I-01)" }
        contribution: { type: string, description: "signed contribution to U_a (decimal, I-01)" }
        direction: { type: string, enum: [positive, negative] }
    EarnAlternative:
      type: object
      required: [asset, protocol, apyPct, lockupDays, riskBand, source]
      additionalProperties: false
      properties:
        asset: { type: string }
        protocol: { type: string }
        apyPct: { type: string, description: "annual percentage yield (decimal, I-01)" }
        lockupDays: { type: integer }
        riskBand: { type: string, enum: [low, medium, high] }
        source: { type: string, enum: [sandbox-mock] }
    GreeksSummary:
      type: object
      required: [greeks, notionalUsd, side, directionalExposure, notes, source]
      additionalProperties: false
      properties:
        greeks: { $ref: "./dse-utility-api.yaml#/components/schemas/Greeks" }
        notionalUsd: { type: string, description: "net notional USD (decimal)" }
        side: { type: string, enum: [long, short, spot] }
        directionalExposure: { type: string, enum: [low, elevated, high] }
        notes: { type: array, items: { type: string } }
        source: { type: string, enum: [sandbox-mock] }
    AnalyticsContext:
      type: object
      required: [analyticsVersion, source]
      additionalProperties: false
      description: >
        T7.6 additive, OPTIONAL DSE analytics enrichment — internal-only
        composition of the T7.5 sandbox Risk Greeks / Earn rates services.
        Informational explanation context; NO execution, NO new public endpoint.
      properties:
        greeksSummary:
          { $ref: "#/components/schemas/GreeksSummary", nullable: true }
        earnAlternatives:
          {
            type: array,
            items: { $ref: "#/components/schemas/EarnAlternative" },
            nullable: true,
          }
        analyticsVersion: { type: string, description: "enrichment traceability tag" }
        source: { type: string, enum: [sandbox-mock] }
    ModelVersions:
      type: object
      required: [pricing, sentiment, kelly, stress]
      additionalProperties: false
      properties:
        pricing: { type: string }
        sentiment: { type: string }
        kelly: { type: string }
        stress: { type: string }
    RecommendResponse:
      type: object
      required: [recommendations, sentiment, modelVersions, disclaimer, asOf]
      additionalProperties: false
      properties:
        recommendations:
          type: array
          items: { $ref: "#/components/schemas/Recommendation" }
        sentiment:
          { $ref: "./dse-utility-api.yaml#/components/schemas/SentimentScore" }
        modelVersions: { $ref: "#/components/schemas/ModelVersions" }
        disclaimer:
          { type: string, description: "MiCA/MiFID advisory disclosure" }
        analyticsContext:
          {
            $ref: "#/components/schemas/AnalyticsContext",
            nullable: true,
            description: "T7.6 additive: optional sandbox analytics enrichment",
          }
        traceId:
          {
            type: string,
            nullable: true,
            description: "T7.7 additive: deterministic trace id (same request -> same id)",
          }
        explanationVersion:
          {
            type: string,
            nullable: true,
            description: "T7.7 additive: explainability-layer version (traceability)",
          }
        decisionTrace:
          {
            $ref: "#/components/schemas/DecisionTrace",
            nullable: true,
            description: "T7.8 DEV-ONLY: opt-in sandbox decision-trace; double-gated (BANXE_DSE_DEBUG_ENABLED + X-Banxe-Dse-Debug header). null/absent in production",
          }
        asOf: { type: string, description: "ISO 8601 UTC" }
    DecisionTraceStep:
      type: object
      required:
        [
          rank, actionType, actionCategory, rawExpectedReturn,
          effectiveExpectedReturn, volatility, var99, var99Source,
          drawdown, liquidity, utilityScore,
        ]
      additionalProperties: false
      properties:
        rank: { type: integer }
        actionType: { type: string }
        actionCategory: { type: string }
        rawExpectedReturn: { type: string, description: "candidate ER fraction (decimal)" }
        earnYieldPct: { type: string, nullable: true, description: "earn yield folded in, if any" }
        effectiveExpectedReturn: { type: string, description: "ER fed into utility (decimal)" }
        volatility: { type: string }
        var99: { type: string, description: "VaR99 fraction fed into utility (decimal)" }
        var99Source: { type: string, enum: [risk-provider, candidate-fallback] }
        drawdown: { type: string }
        liquidity: { type: string }
        utilityScore: { type: string }
    DecisionTrace:
      type: object
      description: >
        T7.8 DEV-ONLY sandbox decision-trace. Reconstructs the mock decision path
        (inputs, normalized features, utility, enrichment) by traceId. Carries NO
        production secrets / keys / endpoints — only request-derived data, mock
        model metadata, and provider class names. Does NOT change utility/ranking.
      required:
        [
          traceId, riskProfile, weights, riskProvider, earnProvider,
          sentimentProvider, stressProvider, enrichmentApplied, steps, note,
        ]
      additionalProperties: false
      properties:
        traceId: { type: string }
        riskProfile: { type: string }
        weights: { $ref: "./dse-utility-api.yaml#/components/schemas/UtilityWeights" }
        riskProvider: { type: string, description: "provider class name or 'none' (not a secret)" }
        earnProvider: { type: string }
        sentimentProvider: { type: string }
        stressProvider: { type: string }
        enrichmentApplied: { type: boolean }
        steps:
          type: array
          items: { $ref: "#/components/schemas/DecisionTraceStep" }
        note: { type: string, description: "sandbox-debug disclaimer" }
