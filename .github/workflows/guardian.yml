# Guardian — backend-local variant.
#
# The banxe-repo-template guardian.yml proxied all validation to an
# evo1-hosted Guardian service via Tailscale VPN (pull_request_target +
# tailscale step + curl to evo1, gated on TS_* secrets). Those secrets are
# absent here, so guardian-factory/guardian-project failed on every PR — the
# same defect fixed for banxe-trading-frontend in IL-179. This workflow
# replaces the remote call with local structural checks appropriate for the
# ADR-021 Python trading backend, and drops the pull_request_target trigger
# (chicken-and-egg / dual-run hazard).
#
# When a shared Guardian service gains backend-aware rules, this workflow can
# be pointed back at it (see banxe-architecture ADR-056 / IL-179 rationale).

name: Guardian

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  guardian:
    name: guardian-${{ matrix.family }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        family: [factory, project]
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Validate (factory)
        if: matrix.family == 'factory'
        run: |
          set -euo pipefail
          echo "--- factory gate: required config files ---"
          test -f .claude/settings.json || { echo "::error::Missing .claude/settings.json"; exit 1; }
          python3 -c "import json; json.load(open('.claude/settings.json'))" \
            || { echo "::error::.claude/settings.json is not valid JSON"; exit 1; }
          test -f .github/workflows/claude.yml || { echo "::error::Missing .github/workflows/claude.yml"; exit 1; }
          echo "factory gate passed"

      - name: Validate (project)
        if: matrix.family == 'project'
        run: |
          set -euo pipefail
          echo "--- project gate: backend structure (Python; ADR-021 trading backend) ---"
          # Baseline identity: a README must exist.
          test -f README.md || { echo "::error::Missing README.md"; exit 1; }
          # Python project descriptor: required as soon as any Python source
          # exists; tolerated-absent only in the pre-code bootstrap state.
          has_py="$(find . -name '*.py' -not -path './.git/*' -print -quit)"
          if [ -n "$has_py" ] || [ -d src ] || [ -d app ]; then
            if [ -f pyproject.toml ] || [ -f requirements.txt ] || [ -f setup.py ] || [ -f setup.cfg ]; then
              echo "project gate: Python sources present and a project descriptor exists"
            else
              echo "::error::Python sources (src/, app/, or *.py) present but no project descriptor (pyproject.toml / requirements.txt / setup.py / setup.cfg)"
              exit 1
            fi
          else
            echo "project gate: pre-code bootstrap (no Python sources yet) — descriptor not yet required"
          fi
          echo "project gate passed"
